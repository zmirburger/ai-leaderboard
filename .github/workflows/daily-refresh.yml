name: Daily refresh

on:
  schedule:
    # 00:00 UTC daily = 08:00 MYT (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:  # allow manual triggers from the Actions tab

permissions:
  contents: write  # needed to commit data.json updates back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh.py
        run: python refresh.py

      - name: Commit changes if data.json updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "No changes to commit."
          else
            git add data.json
            git commit -m "Daily refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
